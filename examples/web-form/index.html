<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LSE Economics Research Workflow Intake</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel" id="intro-panel">
        <p class="eyebrow">Agentic Coding for Economists</p>
        <h1>LSE Economics Research Workflow Intake</h1>
        <p>
          Local practice form for Playwright automation. Nothing is submitted to
          a server.
        </p>
        <button id="start-button" type="button">Start</button>
      </section>

      <form class="panel hidden" id="workflow-form">
        <fieldset data-step="1">
          <legend>Project</legend>
          <label for="project-title">Project title</label>
          <input id="project-title" name="project-title" type="text" required>

          <label for="field">Field</label>
          <select id="field" name="field" required>
            <option value="">Choose one</option>
            <option>Applied microeconomics</option>
            <option>Macroeconomics</option>
            <option>Econometrics</option>
            <option>Finance</option>
            <option>Economic theory</option>
          </select>

          <div class="checkbox-group" aria-label="Workflow goals">
            <p>Workflow goals</p>
            <label><input type="checkbox" name="goals" value="review"> Referee-style review</label>
            <label><input type="checkbox" name="goals" value="replication"> Replication checklist</label>
            <label><input type="checkbox" name="goals" value="browser"> Browser automation</label>
          </div>

          <button type="button" id="next-button">Next</button>
        </fieldset>

        <fieldset class="hidden" data-step="2">
          <legend>Review and data boundaries</legend>
          <label for="review-target">Review target</label>
          <input id="review-target" name="review-target" type="text" placeholder="e.g. seminar draft introduction">

          <label for="data-sensitivity">Data sensitivity</label>
          <select id="data-sensitivity" name="data-sensitivity">
            <option>Public data only</option>
            <option>Confidential data excluded</option>
            <option>Contains restricted data</option>
          </select>

          <label for="notes">Notes for agent</label>
          <textarea id="notes" name="notes" rows="4"></textarea>

          <button type="button" id="back-button">Back</button>
          <button type="submit">Submit request</button>
        </fieldset>
      </form>

      <section class="panel hidden" id="confirmation" aria-live="polite">
        <p class="eyebrow">Confirmation</p>
        <h2>Workshop request received</h2>
        <p id="confirmation-detail"></p>
        <button type="button" id="reset-button">Start again</button>
      </section>
    </main>

    <script>
      const intro = document.querySelector("#intro-panel");
      const form = document.querySelector("#workflow-form");
      const confirmation = document.querySelector("#confirmation");
      const stepOne = document.querySelector("[data-step='1']");
      const stepTwo = document.querySelector("[data-step='2']");
      const detail = document.querySelector("#confirmation-detail");

      document.querySelector("#start-button").addEventListener("click", () => {
        intro.classList.add("hidden");
        form.classList.remove("hidden");
        document.querySelector("#project-title").focus();
      });

      document.querySelector("#next-button").addEventListener("click", () => {
        stepOne.classList.add("hidden");
        stepTwo.classList.remove("hidden");
        document.querySelector("#review-target").focus();
      });

      document.querySelector("#back-button").addEventListener("click", () => {
        stepTwo.classList.add("hidden");
        stepOne.classList.remove("hidden");
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const title = document.querySelector("#project-title").value || "Untitled project";
        form.classList.add("hidden");
        confirmation.classList.remove("hidden");
        detail.textContent = `Saved local workflow request for: ${title}`;
      });

      document.querySelector("#reset-button").addEventListener("click", () => {
        form.reset();
        confirmation.classList.add("hidden");
        intro.classList.remove("hidden");
        stepTwo.classList.add("hidden");
        stepOne.classList.remove("hidden");
      });
    </script>
  </body>
</html>
